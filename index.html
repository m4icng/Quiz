<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quiz Ôn Tập Mobile Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <style>
        /* TỐI ƯU HÓA CHO MOBILE */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f4f8;
            color: #333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .app-container {
            flex: 1;
            padding: 20px 15px;
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        .header { text-align: center; margin-bottom: 20px; }
        .header h2 { color: #102a43; margin: 0; font-size: 1.5em; }

        /* KHUNG HIỂN THỊ CHUNG (Upload, Settings, Result) */
        .card-screen {
            background: #fff;
            padding: 30px 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
            margin-top: 10px;
        }

        /* NÚT BẤM CHÍNH */
        .btn-primary {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 16px 30px;
            border-radius: 12px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0, 242, 254, 0.4);
            transition: transform 0.2s;
            width: 100%;
            border: none;
            margin-top: 15px;
        }
        .btn-primary:active { transform: scale(0.96); }

        .btn-secondary {
            background: #e1e8ef;
            color: #334e68;
            box-shadow: none;
            margin-top: 10px;
        }

        input[type="file"] { display: none; }
        .upload-icon { width: 24px; height: 24px; fill: white; }
        
        #loading { display: none; color: #d68102; font-weight: bold; margin-top: 15px; }

        /* MÀN HÌNH SETTINGS */
        #settings-screen { display: none; }
        .setting-group {
            text-align: left;
            margin-bottom: 20px;
            background: #f8fbff;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #dceefb;
        }
        .setting-group label {
            display: block;
            font-weight: bold;
            color: #243b53;
            margin-bottom: 10px;
        }
        select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #bcccdc;
            font-size: 1em;
            background: #fff;
            outline: none;
        }
        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            font-weight: bold;
            color: #243b53;
        }
        .checkbox-container input {
            width: 20px;
            height: 20px;
            accent-color: #00f2fe;
        }

        /* MÀN HÌNH LÀM BÀI */
        #quiz-screen {
            display: none;
            flex: 1;
            flex-direction: column;
        }
        
        .progress-bar {
            text-align: center;
            font-weight: bold;
            color: #627d98;
            margin-bottom: 15px;
            font-size: 1.1em;
        }

        .question-card {
            background: #fff;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.04);
            flex: 1;
        }
        
        .question-text {
            font-weight: bold;
            font-size: 1.15em;
            margin-bottom: 25px;
            line-height: 1.5;
            color: #102a43;
        }

        .option {
            display: block;
            padding: 15px 18px;
            margin: 12px 0;
            background: #f8fbff;
            border-radius: 12px;
            border: 2px solid #dceefb;
            cursor: pointer;
            font-size: 1.05em;
            line-height: 1.4;
            user-select: none;
            transition: all 0.2s ease;
        }
        .option:active { transform: scale(0.98); }
        
        .option.correct { background: #e3fcef !important; border-color: #38c976 !important; color: #047857 !important; font-weight: bold; }
        .option.incorrect { background: #ffe3e3 !important; border-color: #ff4d4f !important; color: #a8071a !important; text-decoration: line-through; }
        .disabled-options { pointer-events: none; }
        .disabled-options .option:not(.correct):not(.incorrect) { opacity: 0.4; }

        #next-btn {
            display: none;
            width: 100%;
            background: #2c3e50;
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 1.1em;
            font-weight: bold;
            margin-top: 20px;
            cursor: pointer;
        }
        #next-btn:active { transform: scale(0.98); }

        /* MÀN HÌNH KẾT QUẢ */
        #result-screen { display: none; }
        #score-display { font-size: 3em; color: #38c976; font-weight: bold; margin: 10px 0; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header">
            <h2>Ôn Tập Trắc Nghiệm</h2>
        </div>
        
        <div id="upload-screen" class="card-screen">
            <p style="color: #627d98; margin-bottom: 20px;">Hỗ trợ định dạng .docx</p>
            <label for="file-upload" class="btn-primary" style="border-radius: 50px;">
                <svg class="upload-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <path d="M19 4H10.5L8.5 2H5C3.89 2 3 2.89 3 4V18C3 19.11 3.89 20 5 20H19C20.11 20 21 19.11 21 18V6C21 4.89 20.11 4 19 4ZM19 18H5V6H19V18ZM9 15.5L12 11.5L15 15.5H13V17H11V15.5H9Z"/>
                </svg>
                Chọn File Ngân Hàng Câu Hỏi
            </label>
            <input type="file" id="file-upload" accept=".docx" />
            <p id="loading">Đang phân tích dữ liệu...</p>
        </div>

        <div id="settings-screen" class="card-screen">
            <h3 style="color: #102a43; margin-top:0;">Đã tải thành công <span id="total-q-count" style="color: #00f2fe;">0</span> câu!</h3>
            
            <div class="setting-group">
                <label for="chunk-size">Chia số câu mỗi phần:</label>
                <select id="chunk-size" onchange="updatePartOptions()">
                    <option value="all">Làm tất cả (Không chia)</option>
                    <option value="10">10 câu / phần (Để thử nghiệm)</option>
                    <option value="20" selected>20 câu / phần</option>
                    <option value="50">50 câu / phần</option>
                    <option value="100">100 câu / phần</option>
                    <option value="150">150 câu / phần</option>
                </select>
            </div>

            <div class="setting-group" id="part-select-group">
                <label for="part-select">Chọn phần muốn làm:</label>
                <select id="part-select"></select>
            </div>

            <div class="setting-group" style="background: transparent; border: none; padding: 0;">
                <label class="checkbox-container">
                    <input type="checkbox" id="shuffle-check" checked>
                    Đảo ngẫu nhiên thứ tự câu hỏi
                </label>
            </div>

            <button class="btn-primary" onclick="startQuiz()">Bắt đầu ôn tập ➔</button>
        </div>

        <div id="quiz-screen">
            <div class="progress-bar" id="progress-text">Câu 1 / 10</div>
            <div class="question-card">
                <div class="question-text" id="q-text">Đang tải câu hỏi...</div>
                <div id="options-container"></div>
                <button id="next-btn" onclick="nextQuestion()">Tiếp tục ➔</button>
            </div>
        </div>

        <div id="result-screen" class="card-screen">
            <h3 style="margin-top:0; color:#102a43;">Hoàn thành!</h3>
            <p style="color: #627d98;">Số câu trả lời đúng của bạn:</p>
            <div id="score-display">0/0</div>
            
            <button class="btn-primary" onclick="returnToSettings()">Làm phần khác</button>
            <button class="btn-primary btn-secondary" onclick="location.reload()">Tải file mới</button>
        </div>
    </div>

    <script>
        let allQuestions = []; 
        let currentQuizQuestions = []; 
        let currentIndex = 0;
        let correctAnswersCount = 0;

        document.getElementById('file-upload').addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            document.getElementById('loading').style.display = 'block';

            const reader = new FileReader();
            reader.onload = function(loadEvent) {
                const arrayBuffer = loadEvent.target.result;
                mammoth.extractRawText({arrayBuffer: arrayBuffer})
                    .then(function(result) {
                        const text = result.value;
                        allQuestions = parseText(text);
                        
                        if(allQuestions.length > 0) {
                            showSettingsScreen();
                        } else {
                            document.getElementById('loading').style.display = 'none';
                        }
                    })
                    .catch(function(err) {
                        console.error(err);
                        alert("Lỗi đọc file. Hãy đảm bảo đó là file .docx chuẩn.");
                        document.getElementById('loading').style.display = 'none';
                    });
            };
            reader.readAsArrayBuffer(file);
        });

        function parseText(text) {
            const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
            let questions = [];
            let currentQ = { question: "", options: {}, answer: '' };
            let state = "QUESTION"; 

            for (let i = 0; i < lines.length; i++) {
                let line = lines[i];
                let ansMatch = line.match(/^(Đáp án|Answer)[\s:]*([A-D])/i);
                if (ansMatch) {
                    currentQ.answer = ansMatch[2].toUpperCase();
                    if (currentQ.question && Object.keys(currentQ.options).length >= 2) {
                        questions.push({...currentQ});
                    }
                    currentQ = { question: "", options: {}, answer: '' };
                    state = "QUESTION";
                    continue;
                } 

                let optMatch = line.match(/^([A-D])[\.\,\)]\s*(.*)/i);
                if (optMatch) {
                    let letter = optMatch[1].toUpperCase();
                    state = "OPTIONS"; 
                    currentQ.options[letter] = line;
                    continue;
                } 

                if (state === "QUESTION") {
                    if (currentQ.question !== "") currentQ.question += "<br>" + line; 
                    else currentQ.question = line;
                } else if (state === "OPTIONS") {
                    let keys = Object.keys(currentQ.options);
                    if (keys.length > 0) {
                        let lastKey = keys[keys.length - 1];
                        currentQ.options[lastKey] += " " + line;
                    }
                }
            }
            if (currentQ.question && Object.keys(currentQ.options).length >= 2 && currentQ.answer) {
                questions.push(currentQ);
            }
            
            if (questions.length === 0) alert("Không tìm thấy câu hỏi nào! Kiểm tra lại định dạng file.");
            return questions;
        }

        function showSettingsScreen() {
            document.getElementById('upload-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'none';
            document.getElementById('settings-screen').style.display = 'block';
            document.getElementById('total-q-count').textContent = allQuestions.length;
            updatePartOptions(); 
        }

        function updatePartOptions() {
            const chunkSize = document.getElementById('chunk-size').value;
            const partGroup = document.getElementById('part-select-group');
            const partSelect = document.getElementById('part-select');
            
            partSelect.innerHTML = ''; 

            if (chunkSize === 'all') {
                partGroup.style.display = 'none';
            } else {
                partGroup.style.display = 'block';
                const size = parseInt(chunkSize);
                const totalParts = Math.ceil(allQuestions.length / size);
                
                for (let i = 1; i <= totalParts; i++) {
                    const start = (i - 1) * size + 1;
                    const end = Math.min(i * size, allQuestions.length);
                    const option = document.createElement('option');
                    option.value = i;
                    option.textContent = `Phần ${i} (Câu ${start} đến ${end})`;
                    partSelect.appendChild(option);
                }
            }
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function startQuiz() {
            const chunkSize = document.getElementById('chunk-size').value;
            const isShuffle = document.getElementById('shuffle-check').checked;
            
            if (chunkSize === 'all') {
                currentQuizQuestions = [...allQuestions]; 
            } else {
                const size = parseInt(chunkSize);
                const part = parseInt(document.getElementById('part-select').value);
                const startIndex = (part - 1) * size;
                const endIndex = startIndex + size;
                currentQuizQuestions = allQuestions.slice(startIndex, endIndex);
            }

            if (isShuffle) {
                shuffleArray(currentQuizQuestions);
            }

            currentIndex = 0;
            correctAnswersCount = 0;
            document.getElementById('settings-screen').style.display = 'none';
            document.getElementById('quiz-screen').style.display = 'flex';
            
            showQuestion(currentIndex);
        }

        function showQuestion(index) {
            const q = currentQuizQuestions[index];
            const container = document.getElementById('options-container');
            
            document.getElementById('progress-text').textContent = `Câu ${index + 1} / ${currentQuizQuestions.length}`;
            document.getElementById('q-text').innerHTML = q.question.replace(/^Câu\s*\d+:/i, '').trim();
            
            container.innerHTML = '';
            container.classList.remove('disabled-options');
            document.getElementById('next-btn').style.display = 'none';

            for (const [letter, text] of Object.entries(q.options)) {
                const optDiv = document.createElement('div');
                optDiv.className = 'option';
                optDiv.textContent = text;
                optDiv.dataset.letter = letter;
                
                optDiv.onclick = function() { checkAnswer(optDiv, letter, q.answer, container); };
                container.appendChild(optDiv);
            }
        }

        function checkAnswer(selectedEl, selectedLetter, correctLetter, containerEl) {
            containerEl.classList.add('disabled-options');
            const allOptions = containerEl.getElementsByClassName('option');

            if (selectedLetter === correctLetter) {
                selectedEl.classList.add('correct');
                correctAnswersCount++;
            } else {
                selectedEl.classList.add('incorrect');
                for (let opt of allOptions) {
                    if (opt.dataset.letter === correctLetter) {
                        opt.classList.add('correct');
                        break;
                    }
                }
            }
            document.getElementById('next-btn').style.display = 'block';
        }

        function nextQuestion() {
            currentIndex++;
            if (currentIndex < currentQuizQuestions.length) {
                showQuestion(currentIndex);
            } else {
                showResult();
            }
        }

        function showResult() {
            document.getElementById('quiz-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            document.getElementById('score-display').textContent = `${correctAnswersCount} / ${currentQuizQuestions.length}`;
        }

        function returnToSettings() {
            document.getElementById('result-screen').style.display = 'none';
            showSettingsScreen();
        }
    </script>
</body>
</html>
